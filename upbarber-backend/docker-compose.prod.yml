services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3334:3333"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://upbarber:upbarber123@postgres:5432/upbarber
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./uploads:/app/uploads

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: upbarber
      POSTGRES_USER: upbarber
      POSTGRES_PASSWORD: upbarber123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
