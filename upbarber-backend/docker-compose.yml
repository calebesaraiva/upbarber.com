services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    ports:
      - "3333:3333"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://upbarber:upbarber123@postgres:5432/upbarber
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./src:/app/src

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: upbarber
      POSTGRES_USER: upbarber
      POSTGRES_PASSWORD: upbarber123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@upbarber.com
      PGADMIN_DEFAULT_PASSWORD: admin123

volumes:
  postgres_data:
